[pytest]
# Only collect real tests (test_*.py). The stray live-browser probe scripts
# _moniker_test.py and _source_test.py match pytest's DEFAULT *_test.py glob
# and each launches a real browser that times out at collection (~30s on a
# Workday applyManually click), breaking a naive `pytest -q`. Restricting the
# glob to test_*.py makes full-suite collection clean. Added 2026-06-08.
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Belt-and-suspenders: also explicitly ignore the two probes by path.
addopts = --ignore=_moniker_test.py --ignore=_source_test.py
